<!DOCTYPE html>
<html>
    <head>
        <body align="center">
            <header><h1> 게임 파티 구하기 </h1></header>
            <hr>
            <form action="#">
<section><h2> 기본 정보 </h2></section>
<label>닉네임 : <input type="text" placeholder="여기는 닉네임을 입력하세요."><br></label>

<p></p>
<hr>
<section><h2> 게임 선택 </h2></section>

    <option value="1">배틀그라운드</option>
    <option value="2">오버워치</option>
    <option value="3">발로란트</option>
    <option value="4">기타 <input type="text"placeholder="선택에 없는 게임 이름을 입력하세요."></option>
</select><br>
<p>
</p>
<input type="checkbox" value="AOS"> AOS게임

    <option value="1">리그오브레전드</option>
    <option value="4">기타 <input type="text"placeholder="선택에 없는 게임 이름을 입력하세요."></option>
</select><br>
<P></P>

<input type="submit" value="제출">
